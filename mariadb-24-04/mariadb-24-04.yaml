- name: Mariadb Setup Ubuntu 24.04
  hosts: localhost
  become: yes

  vars:
    mariadb_user: dbadmin

  tasks:

    - name: Disable SSH login temporarily
      shell: |
        sed -i 's/#Match User anoncvs/ForceCommand echo Please wait until the installation is completed..../g' /etc/ssh/sshd_config
        systemctl restart ssh
      ignore_errors: yes

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes

    - name: Install MariaDB packages
      ansible.builtin.apt:
        name:
          - mariadb-server
          - mariadb-client
        state: present

    - name: Enable and start MariaDB service
      ansible.builtin.service:
        name: mariadb
        state: started
        enabled: yes

    - name: Verify MariaDB service status
      shell: systemctl status mariadb | grep 'Active:'
      register: mariadb_status
      changed_when: false

    - debug:
        var: mariadb_status.stdout

    - name: Generate MariaDB admin password
      shell: openssl rand -hex 24
      register: rootpassword
      args:
        creates: /root/.mariadb_root_password

    - name: Store MariaDB admin password
      copy:
        dest: /root/.mariadb_root_password
        mode: '0600'
        content: |
          root_mariadb_user = {{ mariadb_user }}
          root_mariadb_pass = {{ rootpassword.stdout }}

    - name: Remove anonymous MariaDB users
      shell: |
        mysql -e "DELETE FROM mysql.user WHERE User='';"
      changed_when: false

    - name: Disable remote root login
      shell: |
        mysql -e "DELETE FROM mysql.user WHERE User='root' AND Host NOT IN ('localhost', '127.0.0.1', '::1');"
      changed_when: false

    - name: Remove test database
      shell: |
        mysql -e "DROP DATABASE IF EXISTS test;"
        mysql -e "DELETE FROM mysql.db WHERE Db='test' OR Db='test\\_%';"
      changed_when: false

    - name: Flush MariaDB privileges
      shell: |
        mysql -e "FLUSH PRIVILEGES;"
      changed_when: false

    - name: Create database admin user
      shell: |
        mysql -e "GRANT ALL PRIVILEGES ON *.* TO '{{ mariadb_user }}'@'localhost' IDENTIFIED BY '{{ rootpassword.stdout }}' WITH GRANT OPTION;"
        mysql -e "FLUSH PRIVILEGES;"
      changed_when: false

    - name: Restart MariaDB service
      ansible.builtin.service:
        name: mariadb
        state: restarted

    - debug:
        msg: "MariaDB admin password stored in /root/.mariadb_root_password"

    - name: Create CloudStack directory
      ansible.builtin.file:
        path: /opt/cloudstack
        state: directory
        mode: '0755'

    - name: Copy cleanup shell script
      ansible.builtin.copy:
        src: /usr/local/src/mariadb-24-04/opt/cloudstack/mariadb-cleanup.sh
        dest: /opt/cloudstack/mariadb-cleanup.sh
        mode: '0755'

    - name: Add cleanup script to bashrc
      lineinfile:
        path: /root/.bashrc
        line: "/opt/cloudstack/mariadb-cleanup.sh"
        state: present

    - name: Re-enable SSH login
      shell: |
        sed -i 's/ForceCommand echo Please wait until the installation is completed..../#Match User anoncvs/g' /etc/ssh/sshd_config
        systemctl restart ssh
      ignore_errors: yes